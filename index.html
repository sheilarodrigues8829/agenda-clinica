<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agenda Clínica</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial;
  background:#eef3f8;
}

header{
  background:#1f4f7a;
  color:white;
  text-align:center;
  padding:20px;
  font-size:26px;
}

.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  padding:15px;
  flex-wrap:wrap;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btn{background:#1f4f7a;color:white;}
.btn-del{background:#c0392b;color:white;}

.container{padding:20px;}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

td,th{
  border:1px solid #ccc;
  padding:4px;
}

td[contenteditable]{background:#fff;}
td[contenteditable]:focus{background:#fff9c4;}
</style>
</head>

<body>

<header>📅 Agenda Clínica</header>

<div class="controls">
  <input type="date" id="dataBase">
  <button class="btn" onclick="gerarSemana()">Nova Semana</button>
</div>

<div id="agenda" class="container"></div>

<script>

// 🔥 SUA CONFIG (JÁ COLOCADA)
const firebaseConfig = {
  apiKey: "AIzaSyDdwpWkqtfPZhKa3OC8Wydqv9swOS1rL28",
  authDomain: "agenda-clinica-2c5c3.firebaseapp.com",
  projectId: "agenda-clinica-2c5c3",
  storageBucket: "agenda-clinica-2c5c3.firebasestorage.app",
  messagingSenderId: "200234101384",
  appId: "1:200234101384:web:68fbd0410f981870d5cd3d",
  measurementId: "G-GP3B13PPVR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let semanaAtual = "";

// GERAR SEMANA
function gerarSemana(){

  const data = document.getElementById("dataBase").value;
  if(!data) return alert("Escolha uma data!");

  semanaAtual = data;

  let html = "<table><tr><th>Sala</th><th>Início</th><th>Fim</th><th>Médico</th><th>Especialidade</th></tr>";

  for(let i=1;i<=10;i++){
    html += `<tr>
      <td>Sala ${i}</td>
      <td contenteditable oninput="salvar()"></td>
      <td contenteditable oninput="salvar()"></td>
      <td contenteditable oninput="salvar()"></td>
      <td contenteditable oninput="salvar()"></td>
    </tr>`;
  }

  html += "</table>";

  document.getElementById("agenda").innerHTML = html;

  carregar();
}

// SALVAR NA NUVEM
function salvar(){

  const dados = [];

  document.querySelectorAll("[contenteditable]").forEach(c=>{
    dados.push(c.innerText);
  });

  db.collection("agenda").doc(semanaAtual).set({
    dados: dados
  });
}

// CARREGAR DA NUVEM
function carregar(){

  db.collection("agenda").doc(semanaAtual).get()
  .then(doc=>{
    if(doc.exists){

      const dados = doc.data().dados;

      document.querySelectorAll("[contenteditable]").forEach((c,i)=>{
        c.innerText = dados[i] || "";
      });

    }
  });
}

// DATA AUTOMÁTICA
window.onload = function(){
  const hoje = new Date().toISOString().split("T")[0];
  document.getElementById("dataBase").value = hoje;
};

</script>

</body>
</html>
